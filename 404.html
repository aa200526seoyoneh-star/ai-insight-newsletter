<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>THE AI INSIGHT - 페이지를 찾을 수 없습니다</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    :root { --primary: #065f46; --accent: #10b981; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Noto Sans KR', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f8fafb;
      text-align: center;
      padding: 24px;
    }
    .container { max-width: 420px; }
    .code { font-size: 80px; font-weight: 900; color: var(--primary); opacity: 0.15; line-height: 1; }
    h1 { font-size: 22px; color: #1f2937; margin: 16px 0 8px; }
    p { color: #6b7280; font-size: 15px; line-height: 1.7; margin-bottom: 24px; }
    a {
      display: inline-block; padding: 12px 28px; background: var(--primary);
      color: #fff; text-decoration: none; border-radius: 10px; font-weight: 600;
      font-size: 14px; transition: background 0.2s;
    }
    a:hover { background: #064e3b; }
  </style>
</head>
<body>
  <div class="container">
    <div class="code">404</div>
    <h1>페이지를 찾을 수 없습니다</h1>
    <p>요청하신 페이지가 존재하지 않거나 이동되었습니다.</p>
    <a href="index.html">메인 페이지로 돌아가기</a>
  </div>
</body>
</html>
