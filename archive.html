<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>THE AI INSIGHT - 지난 뉴스레터</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/shared.css">
  <style>
    .archive-header {
      background: linear-gradient(135deg, var(--primary-dark), var(--primary));
      color: #fff;
      padding: 48px 24px;
      text-align: center;
    }
    .archive-header h1 { font-size: 32px; font-weight: 900; margin-bottom: 8px; }
    .archive-header p { opacity: 0.85; font-size: 15px; }

    .archive-container {
      max-width: 800px;
      margin: -20px auto 60px;
      padding: 0 24px;
      position: relative;
      z-index: 10;
    }

    .search-box {
      background: var(--surface);
      border-radius: 12px;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.06);
      margin-bottom: 32px;
    }
    .search-box svg { color: var(--text-secondary); flex-shrink: 0; }
    .search-box input {
      flex: 1;
      border: none;
      font-size: 15px;
      font-family: inherit;
      outline: none;
      color: var(--text);
    }
    .search-box input::placeholder { color: #d1d5db; }

    .newsletter-list { display: flex; flex-direction: column; gap: 16px; }

    .newsletter-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 28px;
      transition: all 0.2s;
      cursor: default;
    }
    .newsletter-item:hover {
      border-color: var(--primary-light);
      box-shadow: 0 4px 16px rgba(6,95,70,0.06);
      transform: translateY(-1px);
    }

    .nl-meta {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
    }
    .nl-number {
      background: var(--primary-50);
      color: var(--primary);
      font-size: 12px;
      font-weight: 700;
      padding: 4px 10px;
      border-radius: 6px;
    }
    .nl-date {
      color: var(--text-secondary);
      font-size: 13px;
    }
    .nl-title {
      font-size: 18px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 8px;
      line-height: 1.5;
    }
    .nl-summary {
      font-size: 14px;
      color: var(--text-secondary);
      line-height: 1.7;
    }
    .nl-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid var(--border);
    }
    .nl-readers {
      font-size: 12px;
      color: var(--text-secondary);
    }
    .nl-readers strong { color: var(--primary); }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-secondary);
    }
    .empty-state svg { margin-bottom: 16px; opacity: 0.4; }
    .empty-state p { font-size: 15px; }

    .loading {
      text-align: center;
      padding: 60px;
      color: var(--text-secondary);
    }
    .loading-spinner {
      width: 32px;
      height: 32px;
      border: 3px solid var(--border);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Sample content badge */
    .sample-badge {
      display: inline-block;
      background: #fef3c7;
      color: #92400e;
      font-size: 11px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 4px;
      margin-left: 8px;
    }
  </style>
  <script src="config.js"></script>
</head>
<body>

  <!-- Nav -->
  <nav class="nav">
    <div class="nav-inner">
      <a href="index.html" class="nav-logo">THE AI <span>INSIGHT</span></a>
      <div class="nav-links">
        <a href="index.html">구독</a>
        <a href="archive.html" class="active">아카이브</a>
        <a href="admin.html">관리자</a>
      </div>
    </div>
  </nav>

  <!-- Header -->
  <section class="archive-header">
    <h1>지난 뉴스레터</h1>
    <p>THE AI INSIGHT가 전한 인사이트를 다시 만나보세요</p>
  </section>

  <!-- Content -->
  <div class="archive-container">
    <!-- Search -->
    <div class="search-box">
      <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input type="text" id="searchInput" placeholder="뉴스레터 검색..." oninput="filterNewsletters()">
    </div>

    <!-- Newsletter List -->
    <div id="newsletterList" class="newsletter-list">
      <div class="loading">
        <div class="loading-spinner"></div>
        <p>뉴스레터를 불러오는 중...</p>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <footer class="footer">
    <p>&copy; 2026 THE AI INSIGHT by AX추진팀 (서연이화)</p>
    <p style="margin-top:8px;">
      <a href="index.html">구독하기</a> &middot;
      <a href="mailto:aa200526@seoyoneh.com">문의하기</a>
    </p>
  </footer>

  <script>
    const SHEET_ID = (window.ADMIN_CONFIG && window.ADMIN_CONFIG.SHEET_ID) || '';
    let allNewsletters = [];

    // ─── Google Sheets gviz API로 데이터 읽기 ─────────────
    function fetchSheetData(sheetName) {
      return new Promise(function(resolve, reject) {
        var cbName = 'gviz_' + Date.now();
        var url = 'https://docs.google.com/spreadsheets/d/' + SHEET_ID +
          '/gviz/tq?tqx=out:json;responseHandler:' + cbName + '&sheet=' + encodeURIComponent(sheetName);

        window[cbName] = function(response) {
          delete window[cbName];
          if (s.parentNode) s.remove();
          if (response && response.table) {
            var rows = response.table.rows.map(function(row) {
              return row.c.map(function(cell) {
                return cell ? (cell.v !== null ? cell.v : '') : '';
              });
            });
            resolve(rows);
          } else {
            resolve([]);
          }
        };

        var s = document.createElement('script');
        s.src = url;
        s.onerror = function() {
          delete window[cbName];
          if (s.parentNode) s.remove();
          resolve([]);
        };
        document.body.appendChild(s);
      });
    }

    async function loadNewsletters() {
      const container = document.getElementById('newsletterList');

      try {
        var rows = await fetchSheetData('newsletters');

        if (rows.length > 0) {
          allNewsletters = rows.map(function(r) {
            return {
              id: r[0] || '',
              title: r[1] || '',
              date: r[2] || '',
              summary: r[3] || '',
              contentUrl: r[4] || '',
              sentCount: r[5] || 0
            };
          });
          renderNewsletters(allNewsletters, false);
        } else {
          container.innerHTML = '<div class="empty-state"><p>등록된 뉴스레터가 없습니다.</p></div>';
        }
      } catch (error) {
        container.innerHTML = '<div class="empty-state"><p>데이터를 불러올 수 없습니다.</p></div>';
      }
    }

    function renderNewsletters(newsletters, isSample) {
      const container = document.getElementById('newsletterList');

      if (newsletters.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <svg width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
              <path d="M19 20H5a2 2 0 01-2-2V6a2 2 0 012-2h10a2 2 0 012 2v1m2 13a2 2 0 01-2-2V9a2 2 0 012-2h2a2 2 0 012 2v9a2 2 0 01-2 2h-2z"/>
            </svg>
            <p>검색 결과가 없습니다.</p>
          </div>
        `;
        return;
      }

      container.innerHTML = newsletters.map(nl => `
        <article class="newsletter-item">
          <div class="nl-meta">
            <span class="nl-number">${nl.id}</span>
            <span class="nl-date">${formatDate(nl.date)}</span>
            ${isSample ? '<span class="sample-badge">샘플</span>' : ''}
          </div>
          <h3 class="nl-title">${nl.title}</h3>
          <p class="nl-summary">${nl.summary}</p>
          <div class="nl-footer">
            <span class="nl-readers"><strong>${nl.sentCount || 0}</strong>명에게 발송됨</span>
            ${nl.contentUrl ? `<a href="${nl.contentUrl}" class="btn btn-outline" style="padding:6px 14px;font-size:13px;">전문 보기</a>` : ''}
          </div>
        </article>
      `).join('');
    }

    function filterNewsletters() {
      const query = document.getElementById('searchInput').value.toLowerCase();
      const filtered = allNewsletters.filter(nl =>
        nl.title.toLowerCase().includes(query) ||
        nl.summary.toLowerCase().includes(query) ||
        nl.id.toLowerCase().includes(query)
      );
      renderNewsletters(filtered, API_URL === 'https://script.google.com/macros/s/AKfycbxX56OBdahXeBP3wACO5AqzlhmPA5m74lYTYtgTZYCsd8EWJk6R6Wla_q7Lpf9A4LkVaA/exec');
    }

    function formatDate(dateStr) {
      const d = new Date(dateStr);
      return d.getFullYear() + '년 ' + (d.getMonth()+1) + '월 ' + d.getDate() + '일';
    }

    // 페이지 로드 시 실행
    loadNewsletters();
  </script>
</body>
</html>
